---
title: Nächstes Konzert
description: Nächstes Konzert
layout: default
---
{% assign upcoming = site.data.upcoming[0] %}

<div class="py-5">
        <div class="container">
          <div class="row">
            <div class="px-5 col-md-8 text-center mx-auto">
              <h3 class="text-primary display-1"> <b>{{upcoming.titel}}</b></h3>
              <h2 class="">{{upcoming.datum}} - {{upcoming.uhrzeit}}<br></h2>
              <p class="mb-3">{{upcoming.ort}}</p> <a href="#vorverkauf" class="btn btn-primary">Kartenvorverkauf</a>
            </div>
          </div>
        </div>
      </div>
      <div class="py-5 text-center">
        <div class="container">
          <div class="row">
            <div class="mx-auto col-md-7">
              <h1 class="">Preis</h1>
              <p class="lead"> {{upcoming.preis}}</p>
            </div>
          </div>
        </div>
      </div>
      <div class="py-5 text-center">
        <div class="container">
          <div class="row">
            <div class="mx-auto col-md-7">
              <h1 class="" id="vorverkauf">Vorverkauf</h1>
              <p class="lead"> {{upcoming.vorverkauf}}</p>
            </div>
          </div>
        </div>
      </div>
